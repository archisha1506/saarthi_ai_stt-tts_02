<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Audio Assistant</title>
    <!-- Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #38bdf8;
            --primary-glow: rgba(56, 189, 248, 0.4);
            --success: #22c55e;
            --success-glow: rgba(34, 197, 94, 0.4);
            --danger: #ef4444;
            --danger-glow: rgba(239, 68, 68, 0.4);
            --bg-dark: #020617;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a, #020617);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Container & Glassmorphism */
        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 30px;
            position: relative;
        }

        .header {
            text-align: center;
        }

        .header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 15px;
            font-weight: 300;
        }

        /* Status Badge */
        .status-badge {
            align-self: center;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 16px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 100px;
            font-size: 13px;
            font-weight: 500;
            border: 1px solid var(--glass-border);
            transition: all 0.3s ease;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--danger);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--danger);
            position: relative;
        }

        .connected .status-dot {
            background: var(--success);
            box-shadow: 0 0 12px var(--success);
        }

        /* Transcription Display Area */
        .transcript-wrapper {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .section-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            font-weight: 600;
            padding-left: 4px;
        }

        .transcript-box {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 16px;
            padding: 24px;
            min-height: 200px;
            max-height: 350px;
            overflow-y: auto;
            border: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            gap: 16px;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.1) transparent;
        }

        .transcript-box::-webkit-scrollbar { width: 6px; }
        .transcript-box::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }

        .message {
            font-size: 15px;
            line-height: 1.6;
            padding: 12px 16px;
            border-radius: 12px;
            max-width: 85%;
            animation: fadeIn 0.4s ease forwards;
        }

        .message-user {
            background: rgba(56, 189, 248, 0.15);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            border-left: 3px solid var(--primary);
        }

        .message-ai {
            background: rgba(34, 197, 94, 0.15);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border-left: 3px solid var(--success);
        }

        .message-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 4px;
            display: block;
            opacity: 0.8;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Live Visualizer Placeholder */
        .visualizer {
            height: 4px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2px;
            overflow: hidden;
            display: none;
        }

        .visualizer-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, var(--primary), var(--success));
            transition: width 0.1s ease;
        }

        /* Action Controls */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 24px;
            margin-top: 10px;
        }

        .btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 28px;
            border-radius: 100px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            filter: grayscale(1);
        }

        .btn-start {
            background: var(--success);
            color: white;
            box-shadow: 0 4px 15px var(--success-glow);
        }

        .btn-start:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 8px 25px var(--success-glow);
        }

        .btn-stop {
            background: var(--danger);
            color: white;
            box-shadow: 0 4px 15px var(--danger-glow);
        }

        .btn-stop:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 8px 25px var(--danger-glow);
        }

        .btn svg {
            width: 20px;
            height: 20px;
        }

        .live-caption {
            display: none;
            font-size: 14px;
            color: var(--primary);
            font-style: italic;
            margin-top: 12px;
            padding: 10px 16px;
            background: rgba(56, 189, 248, 0.05);
            border-radius: 8px;
            border-left: 2px solid var(--primary);
            animation: fadeIn 0.3s ease;
        }

        /* Pulse Animation for active recording */
        .recording-pulse {
            position: absolute;
            width: 12px;
            height: 12px;
            background: var(--danger);
            border-radius: 50%;
            top: 20px;
            right: 20px;
            display: none;
            animation: pulse-ring 1.5s infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        /* Desktop specific styles */
        @media (min-width: 768px) {
            .container { padding: 48px; }
            .header h1 { font-size: 40px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="recording-pulse" id="recording-indicator"></div>

    <div class="header">
        <h1>AI Voice Assistant</h1>
        <p id="instruction-text">Tap Start to begin your query</p>
    </div>

    <div class="status-badge" id="ws-status">
        <div class="status-dot"></div>
        <span id="ws-status-text">Connecting...</span>
    </div>

    <div class="transcript-wrapper">
        <span class="section-label">Conversation Log</span>
        <div class="transcript-box" id="transcript-box">
            <!-- Messages appear here -->
        </div>
        <div id="live-caption" class="live-caption"></div>
    </div>

    <div class="visualizer" id="visualizer">
        <div class="visualizer-bar" id="visualizer-bar"></div>
    </div>

    <div class="controls">
        <button class="btn btn-start" id="start-btn">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3 2.89 5.35 5.91 5.78V20c0 .55.45 1 1 1s1-.45 1-1v-2.08c3.02-.43 5.42-2.78 5.91-5.78.1-.6-.39-1.14-1-1.14z"/>
            </svg>
            Start
        </button>
        <button class="btn btn-stop" id="stop-btn" disabled>
            <svg viewBox="0 0 24 24" fill="currentColor">
                <rect x="6" y="6" width="12" height="12" rx="2" />
            </svg>
            Stop
        </button>
    </div>
</div>

<script>
    const wsStatusText = document.getElementById('ws-status-text');
    const wsStatusDiv = document.getElementById('ws-status');
    const startBtn = document.getElementById('start-btn');
    const stopBtn = document.getElementById('stop-btn');
    const instructionText = document.getElementById('instruction-text');
    const transcriptBox = document.getElementById('transcript-box');
    const liveCaption = document.getElementById('live-caption');
    const indicator = document.getElementById('recording-indicator');
    const visualizer = document.getElementById('visualizer');
    const visualizerBar = document.getElementById('visualizer-bar');

    let ws = null;
    let mediaRecorder = null;
    let isRecording = false;
    let aiAudioChunks = [];
    let audioOutput = new Audio();

    function connectWebSocket() {
        ws = new WebSocket('ws://localhost:8767');
        
        ws.onopen = () => {
            wsStatusText.innerText = "Connected to Server";
            wsStatusDiv.classList.add('connected');
            startBtn.disabled = false;
        };

        ws.onmessage = async (event) => {
            if (typeof event.data === "string") {
                if (event.data.startsWith("PARTIAL:")) {
                    const text = event.data.substring(8);
                    liveCaption.innerText = "Live: " + text;
                    liveCaption.style.display = "block";
                } else if (event.data.startsWith("TRANSCRIPT:")) {
                    const text = event.data.substring(11);
                    appendMessage("User", text);
                    liveCaption.style.display = "none";
                    liveCaption.innerText = "";
                } else if (event.data === "AUDIO_END") {
                    const audioBlob = new Blob(aiAudioChunks, { type: 'audio/mp3' });
                    const audioUrl = URL.createObjectURL(audioBlob);
                    audioOutput.src = audioUrl;
                    audioOutput.play();
                    
                    // Reset UI
                    aiAudioChunks = [];
                    instructionText.innerText = "AI Response playing...";
                    startBtn.disabled = false;
                }
            } else {
                // Binary response from AI
                aiAudioChunks.push(event.data);
                // Simple hack: if we get the first chunk, assume AI is saying something
                if (aiAudioChunks.length === 1) {
                    instructionText.innerText = "Receiving AI response...";
                }
            }
        };

        ws.onclose = () => {
            wsStatusText.innerText = "Disconnected";
            wsStatusDiv.classList.remove('connected');
            startBtn.disabled = true;
            stopBtn.disabled = true;
            setTimeout(connectWebSocket, 3000);
        };
    }

    function appendMessage(sender, text) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message message-${sender.toLowerCase()}`;
        msgDiv.innerHTML = `<span class="message-label">${sender}</span>${text}`;
        transcriptBox.appendChild(msgDiv);
        transcriptBox.scrollTop = transcriptBox.scrollHeight;

        // If it's a User message, and it's from current interaction, maybe we should also show interaction ID?
        // For now just appending.
    }

    async function startRecording() {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;

        audioOutput.pause();
        
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            
            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0 && ws.readyState === WebSocket.OPEN) {
                    ws.send(e.data);
                }
            };

            mediaRecorder.onstop = () => {
                if (ws.readyState === WebSocket.OPEN) ws.send("END");
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
            };

            mediaRecorder.start(250);
            
            isRecording = true;
            liveCaption.innerText = "Listening...";
            liveCaption.style.display = "block";
            startBtn.disabled = true;
            stopBtn.disabled = false;
            indicator.style.display = "block";
            visualizer.style.display = "block";
            instructionText.innerText = "Listening... Speak clearly.";
            instructionText.style.color = "var(--danger)";
            
            // Artificial visualizer activity
            const visInterval = setInterval(() => {
                if (!isRecording) {
                    clearInterval(visInterval);
                    visualizerBar.style.width = "0%";
                    return;
                }
                visualizerBar.style.width = (30 + Math.random() * 60) + "%";
            }, 100);

        } catch (err) {
            console.error("Mic access error:", err);
            instructionText.innerText = "Microphone error";
        }
    }

    function stopRecording() {
        if (mediaRecorder && isRecording) {
            mediaRecorder.stop();
            isRecording = false;
            stopBtn.disabled = true;
            indicator.style.display = "none";
            visualizer.style.display = "none";
            instructionText.innerText = "Processing response...";
            instructionText.style.color = "var(--primary)";
        }
    }

    startBtn.addEventListener('click', startRecording);
    stopBtn.addEventListener('click', stopRecording);

    // AI speech end handler
    audioOutput.onended = () => {
        instructionText.innerText = "Tap Start to begin your query";
        instructionText.style.color = "var(--text-muted)";
    };

    connectWebSocket();
</script>

</body>
</html>
